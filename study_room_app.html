<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="공부방">
<meta name="theme-color" content="#ffffff">
<title>공부방 관리</title>
<style>
:root {
  --primary: #3B82F6;
  --primary-light: #EFF6FF;
  --primary-dark: #1D4ED8;
  --success: #10B981;
  --success-light: #ECFDF5;
  --danger: #EF4444;
  --danger-light: #FEF2F2;
  --warning: #F59E0B;
  --warning-light: #FFFBEB;
  --text: #111827;
  --text-secondary: #6B7280;
  --text-muted: #9CA3AF;
  --border: #E5E7EB;
  --surface: #F9FAFB;
  --white: #FFFFFF;
  --radius: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--surface); font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; color: var(--text); }

/* 레이아웃 */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 430px; margin: 0 auto; background: var(--white); }
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 20px 12px; flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 20px; font-weight: 700; color: var(--text); }
.header-date { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.header-badge { background: var(--primary-light); color: var(--primary); font-size: 13px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(70px + var(--safe-bottom)); }
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--white); border-top: 1px solid var(--border); display: flex; padding-bottom: var(--safe-bottom); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; cursor: pointer; gap: 3px; }
.nav-icon { font-size: 22px; color: var(--text-muted); }
.nav-label { font-size: 10px; color: var(--text-muted); font-weight: 500; }
.nav-item.active .nav-icon, .nav-item.active .nav-label { color: var(--primary); }

/* 섹션 */
.section { display: none; padding: 16px 20px; }
.section.active { display: block; }
.section-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; margin-top: 20px; }
.section-title:first-child { margin-top: 0; }

/* 카드 */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; }
.card-inner { padding: 14px 16px; }

/* 메트릭 */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.metric { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; }
.metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.metric-value { font-size: 26px; font-weight: 700; color: var(--text); }
.metric.accent { background: var(--primary-light); border-color: transparent; }
.metric.accent .metric-label { color: #93C5FD; }
.metric.accent .metric-value { color: var(--primary-dark); }

/* 학생 행 */
.student-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.student-row:last-child { border-bottom: none; }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; }
.av-blue { background: #DBEAFE; color: #1D4ED8; }
.av-green { background: #D1FAE5; color: #065F46; }
.av-amber { background: #FEF3C7; color: #92400E; }
.av-purple { background: #EDE9FE; color: #5B21B6; }
.av-pink { background: #FCE7F3; color: #9D174D; }
.av-teal { background: #CCFBF1; color: #0F766E; }
.student-info { flex: 1; min-width: 0; }
.student-name { font-size: 15px; font-weight: 600; color: var(--text); }
.student-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.student-time { font-size: 12px; color: var(--text-muted); margin-right: 8px; white-space: nowrap; }

/* 배지 */
.badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.badge-in { background: var(--success-light); color: var(--success); }
.badge-out { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); }
.badge-warn { background: var(--warning-light); color: var(--warning); }

/* 버튼 */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; font-size: 14px; font-weight: 600; padding: 9px 16px; border-radius: var(--radius); border: none; cursor: pointer; transition: opacity 0.15s; }
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--primary); color: white; }
.btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-success { background: var(--success-light); color: var(--success); }
.btn-full { width: 100%; padding: 14px; font-size: 15px; border-radius: 12px; }
.btn-sm { font-size: 12px; padding: 6px 12px; }
.btn:disabled { opacity: 0.4; cursor: default; }

/* 폼 */
.form-group { margin-bottom: 14px; }
label.form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 6px; }
input[type=text], input[type=tel], input[type=time], select, textarea {
  width: 100%; padding: 11px 14px; font-size: 15px; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  background: var(--white); color: var(--text); appearance: none; outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }

/* 체크인 패널 */
.checkin-panel { background: linear-gradient(135deg, #EFF6FF 0%, #F0FDF4 100%); border: 1px solid #BFDBFE; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.checkin-label { font-size: 13px; color: #3B82F6; font-weight: 600; margin-bottom: 10px; }
.checkin-row { display: flex; gap: 10px; }

/* 시간표 */
.schedule-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.schedule-table { min-width: 380px; border-collapse: collapse; width: 100%; }
.schedule-table th, .schedule-table td { padding: 8px 6px; text-align: center; font-size: 12px; border: 1px solid var(--border); }
.schedule-table th { background: var(--surface); font-weight: 600; color: var(--text-secondary); }
.schedule-table .time-col { color: var(--text-muted); background: var(--surface); font-size: 11px; }
.cell-filled { background: #DBEAFE; color: #1D4ED8; font-weight: 500; font-size: 11px; line-height: 1.4; }
.cell-empty { background: var(--white); }

/* 출결 로그 */
.log-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-in { background: var(--success); }
.dot-out { background: var(--danger); }
.log-time { font-size: 12px; color: var(--text-muted); width: 42px; flex-shrink: 0; }
.log-name { font-size: 14px; font-weight: 600; flex: 1; }
.log-type { font-size: 12px; color: var(--text-secondary); }

/* 알림 토스트 */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: #1F2937; color: white; font-size: 14px; font-weight: 500; padding: 12px 20px; border-radius: 24px; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }

/* 모달 */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--white); border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + var(--safe-bottom)); width: 100%; max-width: 430px; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

/* 빈 상태 */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">📚 우리 공부방</div>
        <div class="header-date" id="header-date"></div>
      </div>
      <div class="header-badge" id="header-badge">재실 0명</div>
    </div>
  </div>

  <!-- 콘텐츠 -->
  <div class="content">

    <!-- 대시보드 -->
    <div class="section active" id="sec-dashboard">
      <div class="metric-grid">
        <div class="metric accent">
          <div class="metric-label">지금 재실</div>
          <div class="metric-value" id="m-present">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">오늘 등원</div>
          <div class="metric-value" id="m-today">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">전체 학생</div>
          <div class="metric-value" id="m-total">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">퇴실 완료</div>
          <div class="metric-value" id="m-out">0</div>
        </div>
      </div>

      <div class="checkin-panel">
        <div class="checkin-label">⚡ 빠른 입실</div>
        <div class="checkin-row">
          <select id="quick-select" style="flex:1">
            <option value="">학생 선택...</option>
          </select>
          <button class="btn btn-primary" onclick="quickCheckIn()">입실</button>
        </div>
      </div>

      <div class="section-title">지금 공부방에 있어요</div>
      <div class="card" id="present-card">
        <div class="empty-state">
          <div class="empty-icon">🏫</div>
          <div class="empty-text">아직 입실한 학생이 없어요</div>
        </div>
      </div>
    </div>

    <!-- 학생 관리 -->
    <div class="section" id="sec-students">
      <button class="btn btn-primary btn-full" onclick="openAddStudent()" style="margin-bottom:16px">
        + 새 학생 등록
      </button>
      <div class="section-title">전체 학생</div>
      <div class="card" id="student-list-card"></div>
    </div>

    <!-- 시간표 -->
    <div class="section" id="sec-schedule">
      <div class="section-title">주간 등원 시간표</div>
      <div class="card">
        <div class="schedule-wrap">
          <table class="schedule-table">
            <thead>
              <tr>
                <th class="time-col">시간</th>
                <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
              </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </div>
      <p style="font-size:12px;color:var(--text-muted);text-align:center">학생 등록 시 시간표가 자동으로 업데이트돼요</p>
    </div>

    <!-- 출결 기록 -->
    <div class="section" id="sec-log">
      <div class="section-title">오늘 출결 기록</div>
      <div class="card" id="log-card">
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-text">오늘 기록이 없어요</div>
        </div>
      </div>
      <div class="section-title">전체 기록 보기</div>
      <div class="card" id="all-log-card"></div>
    </div>

  </div>

  <!-- 하단 내비게이션 -->
  <nav class="nav">
    <div class="nav-item active" onclick="switchTab('dashboard',this)">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">대시보드</span>
    </div>
    <div class="nav-item" onclick="switchTab('students',this)">
      <span class="nav-icon">👨‍🎓</span>
      <span class="nav-label">학생</span>
    </div>
    <div class="nav-item" onclick="switchTab('schedule',this)">
      <span class="nav-icon">📅</span>
      <span class="nav-label">시간표</span>
    </div>
    <div class="nav-item" onclick="switchTab('log',this)">
      <span class="nav-icon">📋</span>
      <span class="nav-label">출결</span>
    </div>
  </nav>
</div>

<!-- 학생 추가 모달 -->
<div class="modal-bg" id="modal-add" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">새 학생 등록</div>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input type="text" id="f-name" placeholder="홍길동">
    </div>
    <div class="form-group">
      <label class="form-label">학년</label>
      <select id="f-grade">
        <option value="">선택</option>
        <option>초등 1학년</option><option>초등 2학년</option><option>초등 3학년</option>
        <option>초등 4학년</option><option>초등 5학년</option><option>초등 6학년</option>
        <option>중학 1학년</option><option>중학 2학년</option><option>중학 3학년</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">부모님 연락처</label>
      <input type="tel" id="f-phone" placeholder="010-0000-0000">
    </div>
    <div class="form-group">
      <label class="form-label">등원 요일</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:4px;font-size:14px"><input type="checkbox" value="월" class="day-cb"> 월</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:14px"><input type="checkbox" value="화" class="day-cb"> 화</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:14px"><input type="checkbox" value="수" class="day-cb"> 수</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:14px"><input type="checkbox" value="목" class="day-cb"> 목</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:14px"><input type="checkbox" value="금" class="day-cb"> 금</label>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <label class="form-label" style="margin:0;align-self:center">등원 시간</label>
      <input type="time" id="f-time" value="15:00" style="max-width:130px">
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn btn-outline" style="flex:1;padding:12px" onclick="document.getElementById('modal-add').classList.remove('open')">취소</button>
      <button class="btn btn-primary" style="flex:2;padding:12px" onclick="addStudent()">등록하기</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 데이터 ──────────────────────────────────────────────
let students = JSON.parse(localStorage.getItem('students') || '[]');
let logs = JSON.parse(localStorage.getItem('logs') || '[]');
const COLORS = ['av-blue','av-green','av-amber','av-purple','av-pink','av-teal'];
const todayKey = new Date().toISOString().slice(0,10);

function save() {
  localStorage.setItem('students', JSON.stringify(students));
  localStorage.setItem('logs', JSON.stringify(logs));
}

function initials(name) { return name.slice(0,2); }
function colorFor(idx) { return COLORS[idx % COLORS.length]; }
function nowTime() {
  const n = new Date();
  return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
}

// ── 초기화 ───────────────────────────────────────────────
function init() {
  // 샘플 데이터 (처음 실행 시)
  if (students.length === 0) {
    students = [
      { id:1, name:'김민준', grade:'초등 5학년', phone:'010-1234-5678', days:['월','수','금'], time:'14:30', present:false },
      { id:2, name:'이서연', grade:'중학 1학년', phone:'010-2345-6789', days:['화','목'], time:'15:00', present:false },
      { id:3, name:'박지호', grade:'초등 6학년', phone:'010-3456-7890', days:['월','화','수','목','금'], time:'15:10', present:false },
      { id:4, name:'최유진', grade:'초등 4학년', phone:'010-4567-8901', days:['월','수','금'], time:'15:30', present:false },
      { id:5, name:'강현우', grade:'초등 5학년', phone:'010-5678-9012', days:['화','목'], time:'14:00', present:false },
      { id:6, name:'윤채원', grade:'중학 2학년', phone:'010-6789-0123', days:['월','화','수','목','금'], time:'16:00', present:false },
    ];
    save();
  }
  updateHeader();
  renderDashboard();
  renderStudentList();
  renderSchedule();
  renderLog();
  updateQuickSelect();
}

function updateHeader() {
  const d = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('header-date').textContent =
    d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + days[d.getDay()] + ')';
  const cnt = students.filter(s=>s.present).length;
  document.getElementById('header-badge').textContent = '재실 ' + cnt + '명';
}

// ── 탭 전환 ──────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  if (el) el.classList.add('active');
  if (name === 'log') renderLog();
}

// ── 대시보드 ─────────────────────────────────────────────
function renderDashboard() {
  const present = students.filter(s=>s.present);
  const todayIn = logs.filter(l=>l.date===todayKey && l.type==='in');
  const todayOut = logs.filter(l=>l.date===todayKey && l.type==='out');
  document.getElementById('m-present').textContent = present.length;
  document.getElementById('m-today').textContent = todayIn.length;
  document.getElementById('m-total').textContent = students.length;
  document.getElementById('m-out').textContent = todayOut.length;

  const card = document.getElementById('present-card');
  if (present.length === 0) {
    card.innerHTML = '<div class="empty-state"><div class="empty-icon">🏫</div><div class="empty-text">아직 입실한 학생이 없어요</div></div>';
    return;
  }
  card.innerHTML = present.map((s, i) => {
    const inLog = logs.filter(l=>l.sid===s.id && l.date===todayKey && l.type==='in').pop();
    return `<div class="student-row">
      <div class="avatar ${colorFor(students.indexOf(s))}">${initials(s.name)}</div>
      <div class="student-info">
        <div class="student-name">${s.name}</div>
        <div class="student-sub">${s.grade}</div>
      </div>
      <span class="student-time">${inLog ? inLog.time : '--:--'}</span>
      <button class="btn btn-danger btn-sm" onclick="checkOut(${s.id})">퇴실</button>
    </div>`;
  }).join('');
  updateHeader();
}

function quickCheckIn() {
  const sel = document.getElementById('quick-select');
  const id = parseInt(sel.value);
  if (!id) return;
  checkIn(id);
  sel.value = '';
}

function checkIn(id) {
  const s = students.find(x=>x.id===id);
  if (!s || s.present) return;
  s.present = true;
  logs.push({ sid:id, name:s.name, date:todayKey, time:nowTime(), type:'in' });
  save();
  renderDashboard();
  renderLog();
  updateQuickSelect();
  showToast('✅ ' + s.name + ' 입실 완료');
}

function checkOut(id) {
  const s = students.find(x=>x.id===id);
  if (!s || !s.present) return;
  s.present = false;
  logs.push({ sid:id, name:s.name, date:todayKey, time:nowTime(), type:'out' });
  save();
  renderDashboard();
  renderLog();
  updateQuickSelect();
  showToast('👋 ' + s.name + ' 퇴실 완료');
}

function updateQuickSelect() {
  const sel = document.getElementById('quick-select');
  const absent = students.filter(s=>!s.present);
  sel.innerHTML = '<option value="">학생 선택...</option>' +
    absent.map(s=>`<option value="${s.id}">${s.name} (${s.grade})</option>`).join('');
}

// ── 학생 목록 ────────────────────────────────────────────
function renderStudentList() {
  const card = document.getElementById('student-list-card');
  if (students.length === 0) {
    card.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">등록된 학생이 없어요</div></div>';
    return;
  }
  card.innerHTML = students.map((s, i) => `
    <div class="student-row">
      <div class="avatar ${colorFor(i)}">${initials(s.name)}</div>
      <div class="student-info">
        <div class="student-name">${s.name}</div>
        <div class="student-sub">${s.grade} · ${s.days.join('')} · ${s.time}</div>
        <div class="student-sub">${s.phone}</div>
      </div>
      <span class="badge ${s.present ? 'badge-in' : 'badge-out'}">${s.present ? '재실' : '외출'}</span>
    </div>
  `).join('');
}

// ── 학생 추가 ────────────────────────────────────────────
function openAddStudent() {
  document.getElementById('modal-add').classList.add('open');
  document.getElementById('f-name').value = '';
  document.getElementById('f-grade').value = '';
  document.getElementById('f-phone').value = '';
  document.querySelectorAll('.day-cb').forEach(c => c.checked = false);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-add')) {
    document.getElementById('modal-add').classList.remove('open');
  }
}

function addStudent() {
  const name = document.getElementById('f-name').value.trim();
  const grade = document.getElementById('f-grade').value;
  const phone = document.getElementById('f-phone').value.trim();
  const days = [...document.querySelectorAll('.day-cb:checked')].map(c=>c.value);
  const time = document.getElementById('f-time').value;
  if (!name || !grade) { showToast('⚠️ 이름과 학년을 입력해주세요'); return; }
  const id = Date.now();
  students.push({ id, name, grade, phone, days, time, present:false });
  save();
  document.getElementById('modal-add').classList.remove('open');
  renderStudentList();
  renderSchedule();
  updateQuickSelect();
  document.getElementById('m-total').textContent = students.length;
  showToast('✅ ' + name + ' 등록 완료');
}

// ── 시간표 ───────────────────────────────────────────────
function renderSchedule() {
  const DAY_COLS = ['월','화','수','목','금'];
  const times = ['14:00','15:00','16:00','17:00','18:00'];
  const body = document.getElementById('schedule-body');
  body.innerHTML = times.map(t => {
    const hour = t.split(':')[0];
    const cells = DAY_COLS.map(d => {
      const who = students.filter(s=>s.days.includes(d) && s.time.startsWith(hour));
      return who.length
        ? `<td class="cell-filled">${who.map(s=>s.name).join('<br>')}</td>`
        : `<td class="cell-empty"></td>`;
    }).join('');
    return `<tr><td class="time-col">${t}</td>${cells}</tr>`;
  }).join('');
}

// ── 출결 기록 ────────────────────────────────────────────
function renderLog() {
  const todayLogs = logs.filter(l=>l.date===todayKey).reverse();
  const logCard = document.getElementById('log-card');
  if (todayLogs.length === 0) {
    logCard.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">오늘 기록이 없어요</div></div>';
  } else {
    logCard.innerHTML = todayLogs.map(l=>`
      <div class="log-item">
        <div class="log-dot ${l.type==='in'?'dot-in':'dot-out'}"></div>
        <div class="log-time">${l.time}</div>
        <div class="log-name">${l.name}</div>
        <div class="log-type">${l.type==='in'?'입실':'퇴실'}</div>
      </div>
    `).join('');
  }

  // 전체 기록 (최근 7일)
  const allCard = document.getElementById('all-log-card');
  const recent = logs.slice(-30).reverse();
  if (recent.length === 0) {
    allCard.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><div class="empty-text">기록이 없어요</div></div>';
  } else {
    const grouped = {};
    recent.forEach(l => { if(!grouped[l.date]) grouped[l.date]=[]; grouped[l.date].push(l); });
    allCard.innerHTML = Object.keys(grouped).map(date => {
      const [y,m,d] = date.split('-');
      return `<div style="padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);font-size:12px;font-weight:600;color:var(--text-secondary)">${m}월 ${d}일</div>` +
        grouped[date].map(l=>`
          <div class="log-item">
            <div class="log-dot ${l.type==='in'?'dot-in':'dot-out'}"></div>
            <div class="log-time">${l.time}</div>
            <div class="log-name">${l.name}</div>
            <div class="log-type">${l.type==='in'?'입실':'퇴실'}</div>
          </div>
        `).join('');
    }).join('');
  }
}

// ── 토스트 ───────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
